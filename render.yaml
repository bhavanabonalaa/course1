services:
  - type: web
    name: course1-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        value: course-selection
      - key: PORT
        value: 5000
    healthCheckPath: /
